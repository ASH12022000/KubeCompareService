apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: ns-alpha
  labels:
    app: nginx
    version: v1
spec:
  replicas: 2          # DIFF: ns-beta has 4 replicas
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        version: v1
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          env:
            - name: ENV_NAME
              value: "staging"       # DIFF: ns-beta has "production"
